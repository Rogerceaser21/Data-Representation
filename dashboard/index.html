<script>
  /* Set theme before paint - same logic + same localStorage key as the form inside. */
  (function() {
    try {
      var stored = localStorage.getItem('ais-form-theme');
      var theme = stored || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
    } catch (e) {}
  })();
</script>
<script>
  /* Pre-warm the Apps Script Web App while the user is typing the password.
   * Fire-and-forget GET against ?action=options: this warms the runtime AND
   * primes the read cache for the dropdown data that the form fetches a few
   * seconds later. Eats Apps Script cold-start latency invisibly. */
  (function prewarmAppsScript() {
    try {
      fetch('https://script.google.com/macros/s/AKfycbx3efKiQzs2MSwESEuNBCceXr5FqBCXuk1IgSzPFbOVgLSc3fvXy40e8V9lhw_KH0z2nQ/exec?action=options', {
        method: 'GET',
        redirect: 'follow',
        keepalive: true,
        cache: 'no-store'
      }).catch(function() {});
    } catch (e) {}
  })();
</script>

  --navy:        #fafaf7;

  --rule:        rgba(20, 54, 66, 0.14);
  --rule-soft:   rgba(20, 54, 66, 0.07);
  --page-bg:     #efece2;
  --grad-blue:   rgba(18, 87, 255, 0.05);

  --grad-yellow: rgba(255, 186, 20, 0.06);

* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  font-family: var(--body-font);
  background: var(--page-bg);
  color: var(--paper);

  text-rendering: optimizeLegibility;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  background:

    radial-gradient(circle at 88% 80%, var(--grad-red),    transparent 40%),
    radial-gradient(circle at 80% 12%, var(--grad-yellow), transparent 32%),
    var(--navy);
  transition: background 0.35s ease, color 0.35s ease;
}

.gate-shell {
  flex: 1;
  display: grid;
  grid-template-rows: auto 1fr auto;
  padding: clamp(1.4rem, 4vw, 4rem);
  gap: clamp(1.2rem, 2.4vw, 2rem);
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--body-font);
  font-size: clamp(0.78rem, 1.05vw, 1rem);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--paper-dim);
  padding-bottom: clamp(0.6rem, 1.2vw, 1rem);
  border-bottom: 1px solid var(--rule-soft);
}
.top .left { display: inline-flex; align-items: center; gap: clamp(0.7rem, 1.3vw, 1.1rem); }
.top .ais-logo {
  height: clamp(28px, 4vh, 40px);
  width: auto;
  display: block;
}
.top .school {
  border-left: 1px solid var(--navy-edge);
  padding-left: clamp(0.7rem, 1.3vw, 1.1rem);
  letter-spacing: 0.16em;
}
.top .term {
  color: var(--ais-yellow);
  display: inline-flex;
  align-items: center;
  gap: 0.5em;
  letter-spacing: 0.32em;
}
.top .term::before {
  content: "";
  width: 0.45em; height: 0.45em; border-radius: 50%;
  background: var(--ais-yellow);
  box-shadow: 0 0 8px var(--ais-yellow);
}

.hero {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
}
.gate-card {
  width: 100%;
  max-width: 540px;
  background: var(--navy-elev);
  border: 1px solid var(--rule);
  border-radius: clamp(0.8rem, 1.4vw, 1.2rem);
  padding: clamp(2rem, 4vw, 3.4rem);
  box-shadow: 0 30px 60px -20px var(--shadow-card);
  position: relative;
  overflow: hidden;
}
.gate-card::before {
  content: "";
  position: absolute; top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--ais-red), var(--ais-yellow), var(--ais-blue));
}
.gate-card::after {
  content: "";
  position: absolute; top: 0; right: 0;
  width: clamp(4rem, 7vw, 6rem);
  height: clamp(4rem, 7vw, 6rem);
  background: radial-gradient(circle, rgba(255, 186, 20, 0.18), transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.kicker {
  font-family: var(--body-font);
  font-weight: 700;
  font-size: clamp(0.85rem, 1.1vw, 1.05rem);
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--ais-red);
  display: inline-flex;
  align-items: center;
  gap: 0.7em;
  margin-bottom: clamp(0.8rem, 1.4vw, 1.2rem);
}
.kicker .stripe {
  width: clamp(1.6rem, 2.4vw, 2.2rem);
  height: 3px;
  background: linear-gradient(90deg, var(--ais-red), var(--ais-yellow), var(--ais-blue));

}

.gate-title {
  font-family: var(--display-font);
  font-weight: 700;
  font-size: clamp(2rem, 4.8vw, 3.4rem);
  line-height: 1.0;
  letter-spacing: -0.018em;
  color: var(--paper);
  margin: 0 0 clamp(0.7rem, 1.3vw, 1.1rem);
}
.gate-title em {
  font-style: italic;
  font-weight: 400;
  color: var(--ais-yellow);
  padding-right: 0.08em;
  display: inline-block;
}

.gate-sub {
  font-family: var(--display-font);
  font-style: italic;
  font-weight: 300;
  font-size: clamp(1.05rem, 1.55vw, 1.3rem);
  line-height: 1.4;
  color: var(--paper-dim);
  margin: 0 0 clamp(1.5rem, 2.4vw, 2rem);
  max-width: 38ch;
}

.staticrypt-instructions, .staticrypt-title, .staticrypt-hr { display: none; }

#staticrypt-form { display: flex; flex-direction: column; gap: clamp(0.7rem, 1.3vw, 1.1rem); }

#staticrypt-password {

  font-family: var(--body-font);
  font-size: clamp(1rem, 1.4vw, 1.2rem);
  color: var(--paper);
  letter-spacing: 0.05em;
  outline: none;
  transition: border-color 0.2s ease, background 0.2s ease;
}
#staticrypt-password::placeholder { color: var(--paper-faint); letter-spacing: 0.18em; text-transform: uppercase; font-size: 0.85em; font-weight: 600; }
#staticrypt-password:focus {

.staticrypt-toggle-password-visibility {
  position: absolute;
  right: clamp(0.6rem, 1.1vw, 0.95rem);
  top: 50%;
  transform: translateY(-50%);

  cursor: pointer;
  filter: var(--eye-icon-filter);

  transition: opacity 0.2s ease, filter 0.2s ease;
}
.staticrypt-toggle-password-visibility:hover { opacity: 1; filter: var(--eye-icon-filter-hover); }

.staticrypt-decrypt-button {

  font-size: clamp(0.95rem, 1.3vw, 1.15rem);

  letter-spacing: 0.18em;

.staticrypt-decrypt-button:hover {

:root[data-theme="light"] .staticrypt-decrypt-button { color: #0f1530; }

#staticrypt-remember-label {
  display: inline-flex;
  align-items: center;
  gap: 0.6em;
  font-family: var(--body-font);
  font-size: clamp(0.85rem, 1.15vw, 1.05rem);

  letter-spacing: 0.04em;
  cursor: pointer;
  user-select: none;
}
#staticrypt-remember-label.hidden { display: none; }
#staticrypt-remember {

.staticrypt-error {
  margin: clamp(0.6rem, 1vw, 0.85rem) 0 0;
  padding: clamp(0.6rem, 1vw, 0.85rem) clamp(0.8rem, 1.3vw, 1.1rem);

  border-radius: 6px;
  color: var(--ais-red);
  font-family: var(--body-font);
  font-size: clamp(0.85rem, 1.15vw, 1.05rem);
  font-weight: 600;
  letter-spacing: 0.04em;

}
.shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
@keyframes shake {
  10%, 90% { transform: translateX(-1px); }
  20%, 80% { transform: translateX(2px); }
  30%, 50%, 70% { transform: translateX(-4px); }
  40%, 60% { transform: translateX(4px); }
}

#staticrypt_loading {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--navy);
  z-index: 1000;
}
#staticrypt_loading.hidden { display: none; }
.staticrypt-spinner {
  width: 48px; height: 48px;
  border: 4px solid rgba(255, 186, 20, 0.18);
  border-top-color: var(--ais-yellow);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#staticrypt_content.hidden { display: none; }
.hidden { display: none; }

.foot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--body-font);
  font-size: clamp(0.78rem, 1.05vw, 1rem);

@media (max-width: 600px) {
  .top { font-size: 0.7rem; }
  .top .school { display: none; }
  .foot { flex-direction: column; gap: 0.4rem; text-align: center; }

}
